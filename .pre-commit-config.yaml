repos:
  - repo: local
    hooks:
      # - id: cargo-check
      #   name: cargo check
      #   description: Check the package for errors
      #   entry: cargo check
      #   language: system
      #   types: [rust]
      #   pass_filenames: false

      - id: clippy
        name: clippy fix
        description: Lint rust sources and fix auto-fixable issues
        entry: cargo clippy
        language: system
        args: ["--fix", "--allow-dirty", "--all-targets"]
        types: [rust]
        pass_filenames: false

      - id: fmt
        name: fmt
        description: Format files with cargo fmt
        entry: cargo fmt
        language: system
        types: [rust]
        args: ["--"]

      - id: test
        name: test
        description: Run tests
        entry: cargo test
        language: system
        types: [rust]
        pass_filenames: false
