[workspace]
resolver = "3"
members = ["crates/java-syntax", "lib/rust-asm", "xtask"]

[workspace.dependencies]
anyhow = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower-lsp = "0.20"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
dashmap = "6"
rayon = "1.10"
rustc-hash = "2.1.2"
parking_lot = "0.12"
thiserror = "2"
